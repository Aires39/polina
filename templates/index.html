<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для Полины ❤️</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header">
        <h1>Моя любимая Полина</h1>
        <p>Наведи на сердечко, чтобы увидеть магию...</p>
    </div>

    <div class="container">
        {% for card in cards %}
        <div class="card">
            <div class="card-inner">
                <div class="card-front">❤️</div>
                <div class="card-back" style="background-image: url('../static/images/{{ card.img }}');">
                    <div class="info">
                        <span>{{ card.q }}</span>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
